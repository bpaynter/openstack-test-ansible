---
- name: Common base configuration for all nodes
  hosts: all
  roles:
    - common

- name: Compute plane (Nova + Neutron)
  hosts: compute
  roles:
    - nova_compute
    - neutron_compute

- name: Discover new compute hosts into cell_v2
  hosts: controller.lab.internal
  gather_facts: false
  tasks:
    - name: Discover new compute hosts (cell_v2)
      ansible.builtin.command: nova-manage cell_v2 discover_hosts --verbose
      become: true
      become_user: nova
      register: cell_discover
      changed_when: "'Creating host mapping' in cell_discover.stdout"
