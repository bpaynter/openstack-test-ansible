---
# tasks file for roles/neutron_compute

- name: Enable RDO (OpenStack {{ openstack_release }}) repo + EPEL
  ansible.builtin.dnf:
    name:
      - "centos-release-openstack-{{ openstack_release }}"
      - epel-release
    state: present
  become: true

- name: Enable the CRB repository (RDO build dependencies)
  community.general.dnf_config_manager:
    name: crb
    state: enabled
  become: true

- name: Install the Neutron OVS agent (pulls neutron common + Open vSwitch)
  ansible.builtin.dnf:
    name: 
      - openstack-neutron-openvswitch
      - openstack-selinux
    state: present
  become: true

- name: Ensure Open vSwitch is running (the agent builds br-int/br-tun in it)
  ansible.builtin.service:
    name: openvswitch
    state: started
    enabled: true
  become: true

- name: Enable os_neutron_dac_override SELinux boolean (OVS agent privsep; decision #34)
  ansible.posix.seboolean:
    name: os_neutron_dac_override
    state: true
    persistent: true
  become: true

- name: Deploy neutron.conf
  ansible.builtin.template:
    src: neutron.conf.j2
    dest: /etc/neutron/neutron.conf
    owner: root
    group: neutron
    mode: '0640'
  become: true
  no_log: true
  notify: Restart neutron OVS agent

- name: Deploy openvswitch_agent.ini
  ansible.builtin.template:
    src: openvswitch_agent.ini.j2
    dest: /etc/neutron/plugins/ml2/openvswitch_agent.ini
    owner: root
    group: neutron
    mode: '0640'
  become: true
  notify: Restart neutron OVS agent

- name: Ensure the Neutron OVS agent is enabled and running
  ansible.builtin.service:
    name: neutron-openvswitch-agent
    state: started
    enabled: true
  become: true
